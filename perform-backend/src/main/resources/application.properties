server.port=8080

# OWASP A05 — suppress internal error details from responses
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never

# OWASP A05 — disable all actuator endpoints exposure over HTTP
management.endpoints.web.exposure.exclude=*

# Limit request body size to prevent oversized payload attacks (OWASP A08)
spring.servlet.multipart.max-request-size=1MB
spring.servlet.multipart.max-file-size=1MB
server.tomcat.max-http-form-post-size=1MB
